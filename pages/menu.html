// Tab switching
document.querySelectorAll(".menu-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".menu-tab").forEach(t => {
      t.classList.remove("active");
      t.setAttribute("aria-selected", "false");
    });
    document.querySelectorAll(".menu-panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    tab.setAttribute("aria-selected", "true");
    document.getElementById("panel-" + tab.dataset.panel).classList.add("active");
  });
});

// Parsing CSV con supporto virgolette
function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
  return lines.slice(1).map(line => {
    const values = [];
    let current = "";
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQuotes = !inQuotes; }
      else if (line[i] === "," && !inQuotes) { values.push(current.trim()); current = ""; }
      else { current += line[i]; }
    }
    values.push(current.trim());
    const row = {};
    headers.forEach((h, i) => row[h] = (values[i] || "").replace(/^"|"$/g, "").trim());
    return row;
  }).filter(row => row.nome_it);
}

// Costruisce HTML panel
function buildPanel(items, lang) {
  if (!items.length) return '<p style="color:var(--color-text-light);padding:24px 0;font-style:italic;">Nessun piatto disponibile.</p>';
  let html = "";
  let lastCategory = null;
  items.forEach(item => {
    const categoria = item.categoria || "";
    const nome = (lang === "en" && item.nome_en) ? item.nome_en : item.nome_it;
    const nota = (lang === "en" && item.note_en) ? item.note_en : (item.note_it || "");
    const allergeni = item.allergeni || "";
    const prezzo = item.prezzo || "";
    if (categoria && categoria !== lastCategory) {
      html += `<p class="menu-category">${categoria}</p>`;
      lastCategory = categoria;
    }
    html += `
      <div class="menu-dish">
        <div class="menu-dish-left">
          <span class="menu-dish-name">${nome}</span>
          ${allergeni ? `<span class="menu-dish-allergens">${allergeni}</span>` : ""}
          ${nota ? `<span class="menu-dish-note">${nota}</span>` : ""}
        </div>
        <span class="menu-dish-dots" aria-hidden="true"></span>
        <span class="menu-dish-price">${prezzo}</span>
      </div>`;
  });
  return html;
}

// Carica dal Google Sheet o usa il menu statico
async function loadMenu() {
  if (SHEET_CSV_URL === "INSERISCI_QUI_IL_TUO_LINK_CSV") {
    loadStaticMenu();
    return;
  }
  try {
    const response = await fetch(SHEET_CSV_URL);
    if (!response.ok) throw new Error("Errore caricamento");
    const text = await response.text();
    const rows = parseCSV(text);
    const sezioni = ["tradizione", "origini", "contemporaneita", "dessert"];
    const lang = localStorage.getItem("lang") || "it";
    sezioni.forEach(sezione => {
      const items = rows.filter(r => r.sezione === sezione);
      const panel = document.getElementById("panel-" + sezione);
      if (panel) panel.innerHTML = buildPanel(items, lang);
    });
    // Aggiorna lingua
    document.querySelectorAll(".lang-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        setTimeout(() => {
          const newLang = localStorage.getItem("lang") || "it";
          sezioni.forEach(sezione => {
            const items = rows.filter(r => r.sezione === sezione);
            const panel = document.getElementById("panel-" + sezione);
            if (panel) panel.innerHTML = buildPanel(items, newLang);
          });
        }, 50);
      });
    });
  } catch (err) {
    console.error("Errore menu:", err);
    loadStaticMenu();
  }
}
